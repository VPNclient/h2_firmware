# ocserv-backend.conf
# Configuration for local-only ocserv backend behind h2_vpn stealth proxy

# Listen only on localhost
listen-host = 127.0.0.1
listen-port = 8443

# Authentication (Simple plain text for prototype)
# In production, this can be moved to certificate or token auth
auth = "plain[passwd=/etc/ocserv/ocpasswd]"

# TCP/UDP protocol settings
tcp-port = 8443
udp-port = 8443

# Network settings
# h2-firmware default range
ipv4-network = 192.168.10.0
ipv4-netmask = 255.255.255.0
dns = 8.8.8.8

# Tunnel settings
device = vpns
tun-device = vpns%d

# Maintain session compatibility with AnyConnect/OpenConnect
cisco-client-compat = true

# Local-only backend: no need for external TLS if h2_vpn handles it
# However, ocserv requires GnuTLS setup to start. 
# We'll use self-signed certs for the internal link if needed,
# but ideally we'd use a raw socket if ocserv supports it.
server-cert = /etc/ocserv/server-cert.pem
server-key = /etc/ocserv/server-key.pem

# Max clients for prototype
max-clients = 16
max-same-clients = 2

# Logging
log-level = 2
